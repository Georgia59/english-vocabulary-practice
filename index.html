<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>English Vocabulary Practice</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #20242a;
      --muted: #68707d;
      --line: #d9dee7;
      --accent: #1f7a6d;
      --accent-2: #255f9c;
      --bad: #b23b3b;
      --good: #23724f;
      --shadow: 0 10px 24px rgba(30, 40, 55, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px clamp(16px, 4vw, 48px);
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    h1 {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      letter-spacing: 0;
    }
    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 22px clamp(14px, 4vw, 32px) 40px;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .tile, .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .tile {
      min-height: 96px;
      padding: 16px;
      text-align: left;
      cursor: pointer;
    }
    .tile strong { display: block; font-size: 22px; margin-bottom: 8px; }
    .tile span, .muted { color: var(--muted); }
    .panel { padding: 16px; margin-bottom: 14px; }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .segmented {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef1f5;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      min-height: 42px;
      font-size: 15px;
      cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.secondary { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
    button.danger { color: var(--bad); }
    button.active { background: var(--text); color: #fff; border-color: var(--text); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .study-card {
      min-height: 310px;
      padding: clamp(18px, 4vw, 34px);
      display: grid;
      align-content: center;
      gap: 18px;
    }
    .label { color: var(--muted); font-size: 14px; }
    .term {
      font-size: clamp(30px, 6vw, 56px);
      line-height: 1.14;
      overflow-wrap: anywhere;
    }
    .meaning {
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .note {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .answer-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    input[type="text"] {
      flex: 1 1 260px;
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 18px;
      background: #fff;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 17px;
      line-height: 1.5;
      resize: vertical;
      font-family: inherit;
      background: #fff;
    }
    .reference {
      border-left: 4px solid var(--accent);
      padding: 10px 12px;
      background: #f2f8f6;
      border-radius: 6px;
      font-size: 18px;
      line-height: 1.55;
    }
    .keywords {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .keyword {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      background: #fff;
      font-size: 14px;
    }
    .feedback {
      min-height: 30px;
      font-size: 17px;
      font-weight: 700;
    }
    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    .stat b { display: block; font-size: 24px; }
    .list {
      display: grid;
      gap: 8px;
      max-height: 340px;
      overflow: auto;
    }
    .list-item {
      display: grid;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }
    @media (max-width: 650px) {
      header { align-items: flex-start; flex-direction: column; }
      .top-actions { justify-content: flex-start; }
      .toolbar { align-items: stretch; }
      .segmented, .answer-row { width: 100%; }
      .segmented button, .answer-row button { flex: 1 1 auto; }
      button { min-height: 46px; }
      .study-card { min-height: 280px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>English Vocabulary Practice</h1>
    <div class="top-actions">
      <button id="homeBtn">首页</button>
      <button id="exportBtn">导出进度</button>
      <button id="resetBtn" class="danger">清空进度</button>
    </div>
  </header>
  <main>
    <section id="homeScreen" class="screen active">
      <div class="panel">
        <div class="label">Vocabulary Practice</div>
        <div id="unitGrid" class="grid"></div>
      </div>
      <div class="panel">
        <div class="label">Case Translation</div>
        <div id="caseUnitGrid" class="grid"></div>
      </div>
    </section>

    <section id="categoryScreen" class="screen">
      <div class="panel toolbar">
        <div>
          <div class="label">当前 Unit</div>
          <h2 id="categoryTitle"></h2>
        </div>
        <button id="backToUnits">返回 Unit</button>
      </div>
      <div id="categoryGrid" class="grid"></div>
    </section>

    <section id="practiceScreen" class="screen">
      <div class="panel toolbar">
        <div>
          <div class="label" id="currentScope"></div>
          <strong id="positionText"></strong>
        </div>
        <div class="segmented" aria-label="mode">
          <button data-mode="review" class="active">记忆</button>
          <button data-mode="enToZh">英译中</button>
          <button data-mode="zhToEn">中译英</button>
          <button data-mode="mistakes">错词</button>
        </div>
      </div>
      <div class="panel stats">
        <div class="stat"><span class="label">总数</span><b id="totalStat">0</b></div>
        <div class="stat"><span class="label">已练</span><b id="seenStat">0</b></div>
        <div class="stat"><span class="label">掌握</span><b id="masteredStat">0</b></div>
        <div class="stat"><span class="label">错词</span><b id="wrongStat">0</b></div>
      </div>
      <div class="card study-card">
        <div class="label" id="promptLabel"></div>
        <div id="promptText" class="term"></div>
        <div id="answerArea"></div>
        <div id="feedback" class="feedback"></div>
      </div>
      <div class="panel toolbar">
        <div class="answer-row">
          <button id="prevBtn">上一个</button>
          <button id="mainBtn" class="primary">显示答案</button>
          <button id="nextBtn" class="secondary">下一个</button>
        </div>
        <div class="answer-row">
          <button id="knowBtn">认识</button>
          <button id="dontKnowBtn">不认识</button>
          <button id="shuffleBtn">随机</button>
        </div>
      </div>
      <div id="mistakePanel" class="panel">
        <div class="toolbar">
          <strong>错词本</strong>
          <button id="clearMistakes">清空当前错词</button>
        </div>
        <div id="mistakeList" class="list"></div>
      </div>
    </section>

    <section id="casePracticeScreen" class="screen">
      <div class="panel toolbar">
        <div>
          <div class="label" id="caseScope"></div>
          <strong id="casePositionText"></strong>
        </div>
        <div class="segmented" aria-label="case mode">
          <button data-case-mode="practice" class="active">逐句</button>
          <button data-case-mode="mistakes">错句</button>
          <button data-case-mode="compare">对照</button>
        </div>
      </div>
      <div class="panel stats">
        <div class="stat"><span class="label">总数</span><b id="caseTotalStat">0</b></div>
        <div class="stat"><span class="label">已练</span><b id="caseSeenStat">0</b></div>
        <div class="stat"><span class="label">基本正确</span><b id="caseGoodStat">0</b></div>
        <div class="stat"><span class="label">错句</span><b id="caseWrongStat">0</b></div>
      </div>
      <div class="card study-card">
        <div class="label" id="casePromptLabel">英译中</div>
        <div id="caseEnglish" class="meaning"></div>
        <div id="caseAnswerArea"></div>
        <div id="caseFeedback" class="feedback"></div>
      </div>
      <div class="panel toolbar">
        <div class="answer-row">
          <button id="casePrevBtn">上一个</button>
          <button id="caseMainBtn" class="primary">提交</button>
          <button id="caseNextBtn" class="secondary">下一个</button>
        </div>
        <div class="answer-row">
          <button id="caseHintBtn">关键词</button>
          <button id="caseGoodBtn">基本正确</button>
          <button id="caseUnsureBtn">不熟</button>
          <button id="caseBadBtn">完全不会</button>
        </div>
      </div>
      <div id="caseMistakePanel" class="panel">
        <div class="toolbar">
          <strong>错句本</strong>
          <button id="clearCaseMistakes">清空当前错句</button>
        </div>
        <div id="caseMistakeList" class="list"></div>
      </div>
    </section>
  </main>

geal nerve"]}];
    const CASES = [{"id": "Unit5-case-1", "unit": "Unit5", "english": "E.F. has petechiae in the conjunctivae and splinter hemorrhages in his nail beds. His blood pressure is 138/64, heart rate 80, respiratory rate 18, and temperature 99.5° F (37.5° C). Physical examination revealed a pansystolic murmur over the apex and left lower sternal border.", "translation": "E.F. 结膜可见瘀点，甲床可见裂片状出血。其血压为 138/64 mmHg，心率 80 次/分，呼吸频率 18 次/分，体温 99.5°F，即 37.5°C。体格检查发现心尖部及左下胸骨缘可闻及全收缩期杂音。", "keywords": []}, {"id": "Unit5-case-2", "unit": "Unit5", "english": "Transthoracic echocardiography revealed a vegetation with size of 0.9 cm over the anterior leaflet of mitral valve, and moderate mitral regurgitation. However, the cardiac systolic and diastolic functions were normal.", "translation": "经胸超声心动图显示，二尖瓣前叶可见一处大小为 0.9 cm 的赘生物，并伴有中度二尖瓣反流。然而，患者心脏收缩功能和舒张功能均正常。", "keywords": [{"term": "mitral regurgitation", "meaning": "二尖瓣反流"}]}, {"id": "Unit5-case-3", "unit": "Unit5", "english": "E.F. is sent to the hospital for further workup and treatment and his blood culture results are positive for Staphylococcus aureus. E.F. is started on IV antibiotics and seems to be resting comfortably.", "translation": "E.F. 被送往医院接受进一步检查和治疗，其血培养结果显示金黄色葡萄球菌阳性。E.F. 开始接受静脉抗生素治疗，目前休息状态良好。", "keywords": []}, {"id": "Unit5-case-4", "unit": "Unit5", "english": "E.F. has completed a week of IV antibiotic therapy in the hospital setting. He is afebrile and feeling better. Social services has arranged home IV antibiotic therapy in anticipation of discharge to home.", "translation": "E.F. 已在医院完成一周的静脉抗生素治疗。他已无发热，且自觉症状好转。社会服务部门已安排其出院回家后继续接受家庭静脉抗生素治疗。", "keywords": []}, {"id": "Unit5-case-5", "unit": "Unit5", "english": "A.L. was diagnosed with mitral prolapse with regurgitation and was transferred to the operating room, placed in a supine position, and given general endotracheal anesthesia. Her pericardium was entered longitudinally through a median sternotomy.", "translation": "A.L. 被诊断为二尖瓣脱垂伴反流，随后被转入手术室，取仰卧位，并接受气管内插管全身麻醉。经正中胸骨切开后，纵行切开心包。", "keywords": [{"term": "pericardium", "meaning": "心包(膜)"}]}, {"id": "Unit5-case-6", "unit": "Unit5", "english": "Extracorporeal circulation was established. The aorta was cross-clamped, and cardioplegic solution (to stop the heartbeat) was given into the aortic root intermittently for myocardial protection.", "translation": "建立体外循环。阻断主动脉，并间断向主动脉根部灌注心脏停搏液，以停止心跳并保护心肌。", "keywords": [{"term": "aortic", "meaning": "主动脉的"}, {"term": "aorta", "meaning": "主动脉"}, {"term": "cardioplegic solution", "meaning": "心脏停博液"}]}, {"id": "Unit5-case-7", "unit": "Unit5", "english": "The left atrium was entered via the interatrial groove on the right, exposing the mitral valve. The middle scallop of the posterior leaflet was resected. The remaining leaflets were removed to the areas of the commissures and preserved for the sliding plasty.", "translation": "经右侧房间沟进入左心房，显露二尖瓣。切除后瓣叶中间扇形部。其余瓣叶被游离至连合部区域，并予以保留，用于滑动成形术。", "keywords": [{"term": "atrium", "meaning": "心房"}]}, {"id": "Unit5-case-8", "unit": "Unit5", "english": "The valve was tested by inflating the ventricle with NSS and proved to be competent. The left atrium was closed with continuous No. 4-0 Prolene suture. Air was removed from the heart. The cross-clamp was removed. Cardiac action resumed with normal sinus rhythm.", "translation": "通过向心室内注入生理盐水测试瓣膜，结果显示瓣膜关闭良好。用 4-0 Prolene 连续缝线关闭左心房。排出心腔内气体。解除主动脉阻断后，心脏恢复活动，并呈正常窦性心律。", "keywords": [{"term": "atrium", "meaning": "心房"}, {"term": "ventricle", "meaning": "心室"}]}, {"id": "Unit5-case-9", "unit": "Unit5", "english": "Protamine was given to counteract the heparin. Pacer wires were placed in the right atrium and ventricle. Silicone catheters were placed in the pleural and substernal spaces. The sternum and soft tissue wound was closed.", "translation": "给予鱼精蛋白以拮抗肝素作用。在右心房和右心室放置起搏导线。在胸膜腔及胸骨后间隙放置硅胶引流管。随后关闭胸骨及软组织切口。", "keywords": [{"term": "atrium", "meaning": "心房"}, {"term": "ventricle", "meaning": "心室"}]}, {"id": "Unit6-case-1", "unit": "Unit6", "english": "During surgery, the ruptured segment of the liver was removed, and the laceration was sutured with a heavy, absorbable suture on a large smooth needle.", "translation": "手术过程中，切除了肝脏破裂部分，并使用大号光滑针和粗的可吸收缝线缝合裂伤处。", "keywords": [{"term": "laceration", "meaning": "撕裂伤"}]}, {"id": "Unit6-case-2", "unit": "Unit6", "english": "She also received six units of homologous, leukocyte-reduced whole blood, five units of fresh frozen plasma, and two units of platelets.", "translation": "她还接受了 6 个单位的同种异体去白细胞全血、5 个单位的新鲜冰冻血浆以及 2 个单位的血小板输注。", "keywords": [{"term": "leukocyte", "meaning": "白细胞"}, {"term": "plasma", "meaning": "血浆"}]}, {"id": "Unit6-case-3", "unit": "Unit6", "english": "The lab informed her surgeon that they had two units of B-negative and six units of O-negative blood, which she could have received safely if she needed more blood during the night.", "translation": "实验室通知外科医生，他们备有 2 个单位 B 型 Rh 阴性血和 6 个单位 O 型 Rh 阴性血；如果夜间患者需要更多输血，这些血液可安全输注。", "keywords": []}, {"id": "Unit6-case-4", "unit": "Unit6", "english": "Complete blood count found megaloblastic anemia and bone marrow aspiration revealed abnormal localization of immature precursor.", "translation": "全血细胞计数检查发现巨幼细胞性贫血，骨髓穿刺显示未成熟前体细胞定位异常。", "keywords": [{"term": "anemia", "meaning": "贫血"}, {"term": "megaloblastic anemia", "meaning": "巨幼细胞性贫血"}, {"term": "bone marrow aspiration", "meaning": "骨髓穿刺"}]}, {"id": "Unit6-case-5", "unit": "Unit6", "english": "Two weeks before admission, he developed chills, fever, night sweats and malodorous discharge from a spontaneous presacral ulcer, associated with mild local pain. Vancomycin, levofloxacin, and metronidazole were given intravenously.", "translation": "入院前两周，患者出现寒战、发热、盗汗，并有自发性骶前溃疡流出恶臭分泌物，伴轻度局部疼痛。给予万古霉素、左氧氟沙星和甲硝唑静脉治疗。", "keywords": []}, {"id": "Unit6-case-6", "unit": "Unit6", "english": "The specimen obtained from the bone marrow biopsy was markedly hypercellular and contained predominantly large cells with folded nuclei and moderate amounts of pale cytoplasm containing Auer rods, the characteristic of monoblasts.", "translation": "骨髓活检所获标本显示骨髓细胞显著增多，主要为体积较大的细胞，细胞核呈折叠状，胞质中等量且淡染，并含有 Auer 小体，这是单核母细胞的特征。", "keywords": [{"term": "cytoplasm", "meaning": "细胞质"}]}, {"id": "Unit7-case-1", "unit": "Unit7", "english": "An IV urogram showed a right staghorn calculus. The diagnosis was further confirmed by a renal ultrasound. A renal flow scan showed normal perfusion and no obstruction.", "translation": "静脉尿路造影显示右肾鹿角形结石。肾脏超声进一步证实了该诊断。肾血流扫描显示灌注正常，无梗阻。", "keywords": []}, {"id": "Unit7-case-2", "unit": "Unit7", "english": "A.A. was transferred to surgery for a cystoscopic ureteral laser lithotripsy, insertion of a right retrograde ureteral catheter, and right percutaneous nephrolithotomy.", "translation": "A.A. 被转入外科，接受膀胱镜下输尿管激光碎石术、右侧逆行输尿管导管置入术以及右侧经皮肾镜取石术。", "keywords": [{"term": "lithotripsy", "meaning": "碎石术"}, {"term": "percutaneous nephrolithotomy", "meaning": "经皮肾穿刺取石术"}]}, {"id": "Unit7-case-3", "unit": "Unit7", "english": "Therefore, hospitalization was carried out during which the patient underwent the case evaluations in order to confirm the possibility of an artificial sphincter implantation.", "translation": "因此，患者住院接受病例评估，以确认是否适合植入人工尿道括约肌。", "keywords": [{"term": "artificial sphincter implantation", "meaning": "人工尿道括约肌植入术"}]}, {"id": "Unit7-case-4", "unit": "Unit7", "english": "Such evaluations gave evidence of a high excretory duct within normal limits; the bladder showed normal capacity in the absence of refluxes and mainly in the absence of residual intravesical obstructions with a complete reservoir emptying.", "translation": "这些评估结果显示，排泄管道位置较高但在正常范围内；膀胱容量正常，无反流，且主要未见残余膀胱内梗阻，储尿囊可完全排空。", "keywords": []}, {"id": "Unit7-case-5", "unit": "Unit7", "english": "As the follow-up examination carried out the patient confirmed a perfect continence with good flow and a prosthesis activity which appeared to be normal. The patient had to compress the pump only once and apparently a good filling of the cuff was reached after miction.", "translation": "随访检查中，患者确认尿控完全，尿流良好，假体活动看似正常。患者排尿后仅需按压泵一次，袖套似乎即可达到良好充盈。", "keywords": []}, {"id": "Unit8-case-1", "unit": "Unit8", "english": "The case pertains to a 42-year-old Caucasian female patient, who was admitted in our department due to general weakness, along with incidents of vague abdominal pain for the past 8 months. Her medical history included 2 Cesarean sections, and she was a periodical smoker. Physical examination was proven unremarkable.", "translation": "本病例为一名 42 岁白人女性患者，因全身乏力入院，同时过去 8 个月反复出现隐约腹痛。其既往病史包括两次剖宫产，并有间断吸烟史。体格检查未见明显异常。", "keywords": [{"term": "cesarean", "meaning": "剖腹产术"}]}, {"id": "Unit8-case-2", "unit": "Unit8", "english": "A complete laboratory scan was performed, which demonstrated normal hematocrit and hemoglobin values. Her thyroid hormones revealed an euthyroid state, with TSH, T3 and T4 being within normal limits.", "translation": "完整实验室检查显示，其血细胞比容和血红蛋白水平均正常。甲状腺激素检查提示甲状腺功能正常，TSH、T3 和 T4 均在正常范围内。", "keywords": [{"term": "hemoglobin", "meaning": "血红蛋白"}, {"term": "hematocrit", "meaning": "血细胞比容"}, {"term": "euthyroid", "meaning": "甲状腺机能正常的"}]}, {"id": "Unit8-case-3", "unit": "Unit8", "english": "An ultrasound scan of her neck revealed a normal sized thyroid gland, while an enlarged parathyroid was located on the left lower side of her cervical region, with its dimensions approximately 3×2 cm.", "translation": "颈部超声显示甲状腺大小正常，但在颈部左下方发现一枚增大的甲状旁腺，大小约为 3×2 cm。", "keywords": []}, {"id": "Unit8-case-4", "unit": "Unit8", "english": "Resection of the giant gland was performed by a general surgeon experienced in thyroid surgery through implementation of minimal invasive parathyroidectomy. A small left-sided thyroid incision was performed, approximately 2 cm in length.", "translation": "由一名具有甲状腺手术经验的普通外科医生实施微创甲状旁腺切除术，切除了该巨大腺体。在左侧甲状腺区域作一约 2 cm 长的小切口。", "keywords": [{"term": "parathyroidectomy", "meaning": "甲状旁腺切除术"}, {"term": "minimal invasive parathyroidectomy", "meaning": "微创甲状旁腺切除术"}]}, {"id": "Unit8-case-5", "unit": "Unit8", "english": "After lateral retraction of the sternothyroid muscle and manipulation of the left thyroid lobe, the gross parathyroid adenoma was located, attached on the posterior side of the left lower lobe of her thyroid.", "translation": "将胸骨甲状肌向外侧牵开，并处理左侧甲状腺叶后，在左侧甲状腺下叶后方发现明显增大的甲状旁腺腺瘤，并与其相连。", "keywords": [{"term": "adenoma", "meaning": "腺瘤"}, {"term": "sternothyroid muscle", "meaning": "胸骨甲状肌"}]}, {"id": "Unit8-case-6", "unit": "Unit8", "english": "Careful resection of the gland was performed with identification of the left recurrent laryngeal nerve. The excised specimen was sent for pathologic examination, which was indeed significant for a giant 3×2 cm parathyroid adenoma.", "translation": "在确认左侧喉返神经后，小心切除该腺体。切除标本送病理检查，结果证实为一枚 3×2 cm 的巨大甲状旁腺腺瘤。", "keywords": [{"term": "adenoma", "meaning": "腺瘤"}, {"term": "recurrent laryngeal nerve", "meaning": "喉返神经"}]}, {"id": "Unit8-case-7", "unit": "Unit8", "english": "The postoperative period was uneventful for the patient, with a slight decline in calcium, and her parathormone levels returned within normal limits approximately 8 hours after surgery. She was discharged on the next day, while at 3 month follow up she reported no further symptoms.", "translation": "患者术后过程顺利，仅出现轻度血钙下降；术后约 8 小时，甲状旁腺激素水平恢复至正常范围。患者次日出院，3 个月随访时未再报告相关症状。", "keywords": [{"term": "parathormone", "meaning": "甲状旁腺激素"}]}, {"id": "Unit8-case-8", "unit": "Unit8", "english": "A 4 years old boy presented with complaints of excessive weight gain of 5 months duration and increased frequency of micturition and appearance of body hair for 4 months. There was no history of any other illness, medication or steroid intake. The child was first born at term by normal vaginal delivery and with a birth weight of 3 kg.", "translation": "一名 4 岁男孩因体重过度增加 5 个月、排尿频率增加及体毛出现 4 个月就诊。既往无其他疾病、用药或类固醇摄入史。该患儿为第一胎，足月经阴道正常分娩，出生体重 3 kg。", "keywords": [{"term": "frequency", "meaning": "尿频"}, {"term": "micturition", "meaning": "排尿"}, {"term": "steroid", "meaning": "类固醇"}]}, {"id": "Unit8-case-9", "unit": "Unit8", "english": "Physical examination revealed a chubby boy with moon face, buffalo hump, protruding abdomen, increased body hair and appearance of coarse pubic hair. His intelligence quotient was appropriate for his age and sex.", "translation": "体格检查显示，该男孩体型肥胖，呈满月脸、水牛背、腹部膨隆、体毛增多，并出现粗硬阴毛。其智商与年龄和性别相符。", "keywords": []}, {"id": "Unit8-case-10", "unit": "Unit8", "english": "Adrenal tumor is the common cause of this syndrome in young children, whereas, iatrogenic causes are more common among older children. This 4-year-old male child was diagnosed with Cushing’s syndrome due to a right adrenal adenoma; the child presented with obesity and increased distribution of body hair.", "translation": "肾上腺肿瘤是幼儿发生该综合征的常见原因，而医源性原因在年龄较大的儿童中更为常见。该 4 岁男孩被诊断为右侧肾上腺腺瘤所致库欣综合征，表现为肥胖和体毛分布增多。", "keywords": [{"term": "adenoma", "meaning": "腺瘤"}, {"term": "iatrogenic", "meaning": "医源性的"}, {"term": "adrenal adenoma", "meaning": "肾上腺皮质腺瘤，肾上腺腺瘤"}]}, {"id": "Unit8-case-11", "unit": "Unit8", "english": "After thorough investigation and control of hypertension and dyselectrolytemia, right adrenalectomy was performed. The patient had good clinical recovery with weight loss and biochemical resolution of Cushing’s syndrome.", "translation": "在完成全面检查并控制高血压和电解质紊乱后，患者接受右侧肾上腺切除术。术后患者临床恢复良好，体重下降，库欣综合征的生化异常得到缓解。", "keywords": [{"term": "dyselectrolytemia", "meaning": "电解质紊乱"}, {"term": "adrenalectomy", "meaning": "肾上腺切除术"}]}];
    const STORAGE_KEY = "english-vocabulary-practice-v1";
    const CASE_STORAGE_KEY = "english-case-translation-v1";
    const units = [...new Set(VOCAB.map(item => item.unit))].sort();
    const caseUnits = [...new Set(CASES.map(item => item.unit))].sort();
    const categories = ["Medical terminology", "Words & Phrases"];
    let state = {
      unit: units[0],
      category: categories[0],
      mode: "review",
      index: 0,
      revealed: false,
      submitted: false,
      pool: []
    };
    let caseState = {
      unit: caseUnits[0],
      mode: "practice",
      index: 0,
      submitted: false,
      showHints: false,
      pool: []
    };
    let progress = loadProgress();
    let caseProgress = loadCaseProgress();

    const $ = id => document.getElementById(id);
    const screens = ["homeScreen", "categoryScreen", "practiceScreen", "casePracticeScreen"];

    function keyOf(item) {
      return `${item.unit}|${item.category}|${item.term}|${item.meaning}`;
    }

    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }

    function loadCaseProgress() {
      try {
        return JSON.parse(localStorage.getItem(CASE_STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveCaseProgress() {
      localStorage.setItem(CASE_STORAGE_KEY, JSON.stringify(caseProgress));
    }

    function record(item, correct) {
      const key = keyOf(item);
      const row = progress[key] || { seen: 0, correct: 0, wrong: false, last: "" };
      row.seen += 1;
      if (correct) row.correct += 1;
      row.wrong = correct ? row.wrong : true;
      row.last = new Date().toISOString();
      progress[key] = row;
      saveProgress();
    }

    function setWrong(item, wrong) {
      const key = keyOf(item);
      const row = progress[key] || { seen: 0, correct: 0, wrong: false, last: "" };
      row.wrong = wrong;
      progress[key] = row;
      saveProgress();
    }

    function showScreen(id) {
      screens.forEach(s => $(s).classList.toggle("active", s === id));
    }

    function scopedItems() {
      return VOCAB.filter(item => item.unit === state.unit && item.category === state.category);
    }

    function activeItems() {
      const base = scopedItems();
      if (state.mode !== "mistakes") return base;
      return base.filter(item => progress[keyOf(item)]?.wrong);
    }

    function renderHome() {
      $("unitGrid").innerHTML = units.map(unit => {
        const count = VOCAB.filter(item => item.unit === unit).length;
        return `<button class="tile" data-unit="${unit}"><strong>${unit}</strong><span>${count} 个项目</span></button>`;
      }).join("");
      document.querySelectorAll("[data-unit]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.unit = btn.dataset.unit;
          $("categoryTitle").textContent = state.unit;
          renderCategories();
          showScreen("categoryScreen");
        });
      });
      $("caseUnitGrid").innerHTML = caseUnits.map(unit => {
        const count = CASES.filter(item => item.unit === unit).length;
        return `<button class="tile" data-case-unit="${unit}"><strong>${unit}</strong><span>${count} 个翻译句</span></button>`;
      }).join("");
      document.querySelectorAll("[data-case-unit]").forEach(btn => {
        btn.addEventListener("click", () => {
          caseState.unit = btn.dataset.caseUnit;
          caseState.mode = "practice";
          caseState.index = 0;
          caseState.submitted = false;
          caseState.showHints = false;
          refreshCasePool();
          showScreen("casePracticeScreen");
          renderCasePractice();
        });
      });
    }

    function renderCategories() {
      $("categoryGrid").innerHTML = categories.map(category => {
        const count = VOCAB.filter(item => item.unit === state.unit && item.category === category).length;
        return `<button class="tile" data-category="${category}" ${count ? "" : "disabled"}><strong>${category}</strong><span>${count} 个项目</span></button>`;
      }).join("");
      document.querySelectorAll("[data-category]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.category = btn.dataset.category;
          state.mode = "review";
          state.index = 0;
          state.revealed = false;
          state.submitted = false;
          refreshPool();
          showScreen("practiceScreen");
          renderPractice();
        });
      });
    }

    function refreshPool() {
      state.pool = activeItems();
      if (state.index >= state.pool.length) state.index = 0;
    }

    function isWritingMode(mode) {
      return mode === "enToZh" || mode === "zhToEn" || mode === "mistakes";
    }

    function normalizeAnswer(value) {
      return value.toLowerCase().replace(/[’']/g, "'").replace(/\s+/g, " ").trim();
    }

    function normalizeMeaning(value) {
      return value.toLowerCase().replace(/[\s,，;；.。:：、/()（）]/g, "").trim();
    }

    function meaningAnswers(item) {
      const parts = item.meaning.split(/[;；,，、/]/).map(part => part.trim()).filter(Boolean);
      return [...new Set([item.meaning, ...parts])];
    }

    function termAnswers(item) {
      const answers = new Set([item.term, ...item.answers]);
      for (const value of [...answers]) {
        if (!value.includes("/")) continue;
        const parts = value.split("/").map(part => part.trim()).filter(Boolean);
        parts.forEach(part => answers.add(part));
        const tailWords = parts[parts.length - 1].split(/\s+/);
        const suffix = tailWords.length > 1 ? tailWords[tailWords.length - 1] : "";
        if (suffix) {
          parts.slice(0, -1).forEach(part => {
            if (!part.includes(" ")) answers.add(`${part} ${suffix}`);
          });
        }
      }
      return [...answers];
    }

    function isCorrect(input, item) {
      if (state.mode === "enToZh") {
        const answer = normalizeMeaning(input);
        if (!answer) return false;
        return meaningAnswers(item).some(value => normalizeMeaning(value) === answer);
      }
      const answer = normalizeAnswer(input);
      if (!answer) return false;
      return termAnswers(item).some(a => normalizeAnswer(a) === answer);
    }

    function currentItem() {
      refreshPool();
      return state.pool[state.index];
    }

    function renderPractice() {
      document.querySelectorAll("[data-mode]").forEach(btn => btn.classList.toggle("active", btn.dataset.mode === state.mode));
      $("currentScope").textContent = `${state.unit} / ${state.category}`;
      refreshPool();
      updateStats();
      renderMistakes();
      const item = currentItem();
      $("positionText").textContent = state.pool.length ? `${state.index + 1} / ${state.pool.length}` : "0 / 0";
      $("feedback").textContent = "";
      $("feedback").className = "feedback";
      $("knowBtn").disabled = isWritingMode(state.mode) || !item;
      $("dontKnowBtn").disabled = isWritingMode(state.mode) || !item;
      $("prevBtn").disabled = !item || state.pool.length < 2;
      $("nextBtn").disabled = !item || state.pool.length < 2;
      if (!item) {
        $("promptLabel").textContent = "没有可练习的项目";
        $("promptText").textContent = state.mode === "mistakes" ? "当前没有错词" : "这个分类暂无内容";
        $("answerArea").innerHTML = "";
        $("mainBtn").disabled = true;
        return;
      }
      $("mainBtn").disabled = false;
      if (isWritingMode(state.mode)) {
        renderDictation(item);
      } else {
        renderReview(item);
      }
    }

    function renderReview(item) {
      $("promptLabel").textContent = "记忆";
      $("promptText").textContent = item.term;
      $("mainBtn").textContent = "下一个";
      $("answerArea").innerHTML = `<div class="meaning">${escapeHtml(item.meaning)}</div>${item.note ? `<div class="note">${escapeHtml(item.note)}</div>` : ""}`;
    }

    function renderDictation(item) {
      const englishAnswer = state.mode !== "enToZh";
      $("promptLabel").textContent = state.mode === "enToZh" ? "英译中" : (state.mode === "mistakes" ? "错词：中译英" : "中译英");
      $("promptText").textContent = englishAnswer ? item.meaning : item.term;
      $("mainBtn").textContent = state.submitted ? "下一个" : "提交";
      const answerText = englishAnswer ? item.term : item.meaning;
      const extra = englishAnswer && item.note ? "；" + escapeHtml(item.note) : "";
      const result = state.submitted ? `<div class="note">答案：${escapeHtml(answerText)}${extra}</div>` : "";
      $("answerArea").innerHTML = `
        <div class="answer-row">
          <input id="answerInput" type="text" enterkeyhint="done" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="${englishAnswer ? "输入英文" : "输入中文释义"}">
        </div>
        ${result}
      `;
      const input = $("answerInput");
      input.focus();
      input.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          handleEnter();
        }
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[ch]));
    }

    function updateStats() {
      const items = scopedItems();
      let seen = 0, mastered = 0, wrong = 0;
      for (const item of items) {
        const row = progress[keyOf(item)];
        if (row?.seen) seen += 1;
        if (row?.seen >= 2 && row.correct / row.seen >= 0.8 && !row.wrong) mastered += 1;
        if (row?.wrong) wrong += 1;
      }
      $("totalStat").textContent = items.length;
      $("seenStat").textContent = seen;
      $("masteredStat").textContent = mastered;
      $("wrongStat").textContent = wrong;
    }

    function renderMistakes() {
      const wrongItems = scopedItems().filter(item => progress[keyOf(item)]?.wrong);
      $("mistakeList").innerHTML = wrongItems.length ? wrongItems.map(item => `
        <div class="list-item">
          <strong>${escapeHtml(item.term)}</strong>
          <span>${escapeHtml(item.meaning)}</span>
        </div>
      `).join("") : `<div class="muted">暂无错词</div>`;
    }

    function submitAnswer() {
      const item = currentItem();
      if (!item) return;
      const input = $("answerInput");
      if (!input) return;
      const value = input.value.trim();
      if (!value) return;
      const ok = isCorrect(value, item);
      record(item, ok);
      if (ok) setWrong(item, false);
      $("feedback").textContent = ok ? "正确" : "错误";
      $("feedback").className = `feedback ${ok ? "good" : "bad"}`;
      state.submitted = true;
      renderDictation(item);
      $("feedback").textContent = ok ? "正确" : "错误";
      $("feedback").className = `feedback ${ok ? "good" : "bad"}`;
      updateStats();
      renderMistakes();
    }

    function nextItem() {
      refreshPool();
      if (!state.pool.length) {
        renderPractice();
        return;
      }
      state.index = (state.index + 1) % state.pool.length;
      state.revealed = false;
      state.submitted = false;
      renderPractice();
    }

    function prevItem() {
      refreshPool();
      if (!state.pool.length) return;
      state.index = (state.index - 1 + state.pool.length) % state.pool.length;
      state.revealed = false;
      state.submitted = false;
      renderPractice();
    }

    function mainAction() {
      const item = currentItem();
      if (!item) return;
      if (isWritingMode(state.mode)) {
        state.submitted ? nextItem() : submitAnswer();
        return;
      }
      record(item, true);
      nextItem();
    }

    function handleEnter() {
      if (document.getElementById("practiceScreen").classList.contains("active")) {
        mainAction();
        return;
      }
      if (document.getElementById("casePracticeScreen").classList.contains("active")) {
        caseMainAction();
      }
    }

    function shufflePool() {
      refreshPool();
      for (let i = state.pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [state.pool[i], state.pool[j]] = [state.pool[j], state.pool[i]];
      }
      state.index = 0;
      state.revealed = false;
      state.submitted = false;
      renderPractice();
    }

    function caseKeyOf(item) {
      return item.id;
    }

    function scopedCases() {
      return CASES.filter(item => item.unit === caseState.unit);
    }

    function activeCases() {
      const base = scopedCases();
      if (caseState.mode !== "mistakes") return base;
      return base.filter(item => caseProgress[caseKeyOf(item)]?.wrong);
    }

    function refreshCasePool() {
      caseState.pool = activeCases();
      if (caseState.index >= caseState.pool.length) caseState.index = 0;
    }

    function currentCase() {
      refreshCasePool();
      return caseState.pool[caseState.index];
    }

    function recordCase(item, level) {
      const key = caseKeyOf(item);
      const row = caseProgress[key] || { seen: 0, good: 0, wrong: false, last: "", level: "" };
      row.seen += 1;
      row.level = level;
      row.last = new Date().toISOString();
      if (level === "good") {
        row.good += 1;
        row.wrong = false;
      } else {
        row.wrong = true;
      }
      caseProgress[key] = row;
      saveCaseProgress();
    }

    function setCaseWrong(item, wrong) {
      const key = caseKeyOf(item);
      const row = caseProgress[key] || { seen: 0, good: 0, wrong: false, last: "", level: "" };
      row.wrong = wrong;
      caseProgress[key] = row;
      saveCaseProgress();
    }

    function updateCaseStats() {
      const items = scopedCases();
      let seen = 0, good = 0, wrong = 0;
      for (const item of items) {
        const row = caseProgress[caseKeyOf(item)];
        if (row?.seen) seen += 1;
        if (row?.good) good += 1;
        if (row?.wrong) wrong += 1;
      }
      $("caseTotalStat").textContent = items.length;
      $("caseSeenStat").textContent = seen;
      $("caseGoodStat").textContent = good;
      $("caseWrongStat").textContent = wrong;
    }

    function renderCaseMistakes() {
      const wrongItems = scopedCases().filter(item => caseProgress[caseKeyOf(item)]?.wrong);
      $("caseMistakeList").innerHTML = wrongItems.length ? wrongItems.map(item => `
        <div class="list-item">
          <strong>${escapeHtml(item.english)}</strong>
          <span>${escapeHtml(item.translation)}</span>
        </div>
      `).join("") : `<div class="muted">暂无错句</div>`;
    }

    function renderKeywords(item) {
      if (!caseState.showHints && !caseState.submitted && caseState.mode !== "compare") return "";
      if (!item.keywords.length) return `<div class="muted">暂无关键词</div>`;
      return `<div class="keywords">${item.keywords.map(k => `<span class="keyword">${escapeHtml(k.term)}：${escapeHtml(k.meaning)}</span>`).join("")}</div>`;
    }

    function renderCasePractice() {
      document.querySelectorAll("[data-case-mode]").forEach(btn => btn.classList.toggle("active", btn.dataset.caseMode === caseState.mode));
      refreshCasePool();
      updateCaseStats();
      renderCaseMistakes();
      const item = currentCase();
      $("caseScope").textContent = `${caseState.unit} / Case Translation`;
      $("casePositionText").textContent = caseState.pool.length ? `${caseState.index + 1} / ${caseState.pool.length}` : "0 / 0";
      $("caseFeedback").textContent = "";
      $("caseFeedback").className = "feedback";
      $("casePrevBtn").disabled = !item || caseState.pool.length < 2;
      $("caseNextBtn").disabled = !item || caseState.pool.length < 2;
      $("caseHintBtn").disabled = !item;
      $("caseGoodBtn").disabled = !item || !caseState.submitted;
      $("caseUnsureBtn").disabled = !item || !caseState.submitted;
      $("caseBadBtn").disabled = !item || !caseState.submitted;
      if (!item) {
        $("casePromptLabel").textContent = "没有可练习的项目";
        $("caseEnglish").textContent = caseState.mode === "mistakes" ? "当前没有错句" : "这个 Unit 暂无病例翻译内容";
        $("caseAnswerArea").innerHTML = "";
        $("caseMainBtn").disabled = true;
        return;
      }
      $("caseMainBtn").disabled = false;
      $("casePromptLabel").textContent = caseState.mode === "compare" ? "对照模式" : "英译中";
      $("caseEnglish").textContent = item.english;
      $("caseMainBtn").textContent = caseState.submitted || caseState.mode === "compare" ? "下一个" : "提交";
      const reference = (caseState.submitted || caseState.mode === "compare")
        ? `<div class="reference"><strong>参考译文：</strong>${escapeHtml(item.translation)}</div>`
        : "";
      const input = caseState.mode === "compare" ? "" : `
        <textarea id="caseInput" enterkeyhint="done" autocomplete="off" placeholder="输入你的中文翻译。按回车提交，Shift+Enter 换行。"></textarea>
      `;
      $("caseAnswerArea").innerHTML = `${input}${reference}${renderKeywords(item)}`;
      const textarea = $("caseInput");
      if (textarea) {
        textarea.focus();
        textarea.addEventListener("keydown", event => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            event.stopPropagation();
            handleEnter();
          }
        });
      }
    }

    function submitCaseTranslation() {
      const item = currentCase();
      if (!item) return;
      caseState.submitted = true;
      caseState.showHints = true;
      renderCasePractice();
      $("caseFeedback").textContent = "对照参考译文后自评分";
    }

    function nextCase() {
      refreshCasePool();
      if (!caseState.pool.length) {
        renderCasePractice();
        return;
      }
      caseState.index = (caseState.index + 1) % caseState.pool.length;
      caseState.submitted = false;
      caseState.showHints = false;
      renderCasePractice();
    }

    function prevCase() {
      refreshCasePool();
      if (!caseState.pool.length) return;
      caseState.index = (caseState.index - 1 + caseState.pool.length) % caseState.pool.length;
      caseState.submitted = false;
      caseState.showHints = false;
      renderCasePractice();
    }

    function caseMainAction() {
      if (caseState.mode === "compare" || caseState.submitted) {
        nextCase();
      } else {
        submitCaseTranslation();
      }
    }

    $("homeBtn").addEventListener("click", () => showScreen("homeScreen"));
    $("backToUnits").addEventListener("click", () => showScreen("homeScreen"));
    $("mainBtn").addEventListener("click", mainAction);
    $("nextBtn").addEventListener("click", nextItem);
    $("prevBtn").addEventListener("click", prevItem);
    $("shuffleBtn").addEventListener("click", shufflePool);
    $("caseMainBtn").addEventListener("click", caseMainAction);
    $("caseNextBtn").addEventListener("click", nextCase);
    $("casePrevBtn").addEventListener("click", prevCase);
    $("caseHintBtn").addEventListener("click", () => {
      caseState.showHints = !caseState.showHints;
      renderCasePractice();
    });
    $("caseGoodBtn").addEventListener("click", () => {
      const item = currentCase();
      if (item) recordCase(item, "good");
      nextCase();
    });
    $("caseUnsureBtn").addEventListener("click", () => {
      const item = currentCase();
      if (item) recordCase(item, "unsure");
      nextCase();
    });
    $("caseBadBtn").addEventListener("click", () => {
      const item = currentCase();
      if (item) recordCase(item, "bad");
      nextCase();
    });
    $("knowBtn").addEventListener("click", () => {
      const item = currentItem();
      if (item) {
        record(item, true);
        setWrong(item, false);
      }
      nextItem();
    });
    $("dontKnowBtn").addEventListener("click", () => {
      const item = currentItem();
      if (item) {
        record(item, false);
        setWrong(item, true);
      }
      nextItem();
    });
    document.querySelectorAll("[data-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        state.mode = btn.dataset.mode;
        state.index = 0;
        state.revealed = false;
        state.submitted = false;
        renderPractice();
      });
    });
    document.querySelectorAll("[data-case-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        caseState.mode = btn.dataset.caseMode;
        caseState.index = 0;
        caseState.submitted = false;
        caseState.showHints = false;
        renderCasePractice();
      });
    });
    $("clearMistakes").addEventListener("click", () => {
      scopedItems().forEach(item => setWrong(item, false));
      renderPractice();
    });
    $("clearCaseMistakes").addEventListener("click", () => {
      scopedCases().forEach(item => setCaseWrong(item, false));
      renderCasePractice();
    });
    $("resetBtn").addEventListener("click", () => {
      if (confirm("确定清空全部学习进度？")) {
        progress = {};
        caseProgress = {};
        saveProgress();
        saveCaseProgress();
        if (document.getElementById("practiceScreen").classList.contains("active")) renderPractice();
        if (document.getElementById("casePracticeScreen").classList.contains("active")) renderCasePractice();
      }
    });
    $("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify({ vocabulary: progress, cases: caseProgress }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "english-study-progress.json";
      a.click();
      URL.revokeObjectURL(url);
    });
    document.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      if (event.isComposing) return;
      const active = document.activeElement;
      if (active && active.id === "answerInput") return;
      event.preventDefault();
      handleEnter();
    });

    renderHome();
  </script>
</body>
</html>
